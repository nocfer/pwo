name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - deploy/gh-pages   # or whatever branch you want to trigger deploys

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Deploy to GitHub Pages
        run: |
          npm run deploy